    options: [

    explanation: "日本語教師は学習者の氏名・連絡先・国籍・在留資格・成績・学習上の困難などの個人情報を適切に管理する義務があります。個人情報保護法・機関の規程に従い、第三者への無断提供・目的外使用・適切でない情報管理は法的・倫理的に許されません。"

  {

    question: "「批判的教育学（critical pedagogy）」の日本語教育への応用として正しいものはどれか。",
    options: [
      "教師が学習者を批判的に評価すること",
      "言語教育を通じて社会的不平等・権力関係に気づかせ、学習者が社会変革の主体となることを促す教育観",
      "文法の誤りを厳しく指摘する教授法",
      "批判的思考力より正確な文法を優先する立場"
    ],
    answer: 1,
    explanation: "批判的教育学（フレイレ Freire の思想に基づく）は教育を社会的・政治的な営みとして捉え、言語教育を通じて学習者が社会の不平等・権力構造に批判的に気づき、自分の生活・社会を変えていく主体となることを促す教育観です。日本語教育での社会参加・エンパワーメントの理論的基盤の一つです。"
  },

const CATEGORIES = ["すべて", "言語の構造", "言語と教育", "言語と心理", "言語と社会", "社会・文化・地域"];

// 暖色系カテゴリカラー
const CATEGORY_COLORS = {
  "言語の構造":    { accent: "#e8400c", light: "#e8400c18", label: "🔤" },
  "言語と教育":    { accent: "#f97316", light: "#f9731618", label: "📚" },
  "言語と心理":    { accent: "#f59e0b", light: "#f59e0b18", label: "🧠" },
  "言語と社会":    { accent: "#ef4444", light: "#ef444418", label: "🌏" },
  "社会・文化・地域": { accent: "#ec4899", light: "#ec489918", label: "🗾" },
};

// カラーパレット
const C = {
  bg:        "#fff8f3",       // 温かいオフホワイト
  bgDeep:    "#fff1e6",       // クリーム
  surface:   "#ffffff",       // カード白
  border:    "#f5d5b8",       // 暖かいボーダー
  orange:    "#f97316",       // メインオレンジ
  orangeD:   "#ea6c0a",       // ダークオレンジ
  red:       "#e8400c",       // 朱赤
  amber:     "#f59e0b",       // 琥珀
  pink:      "#ec4899",       // ピンク
  green:     "#16a34a",       // 正解グリーン
  wrong:     "#e8400c",       // 不正解赤
  text:      "#3d1f00",       // 濃い茶テキスト
  textMid:   "#7c4a1e",       // 中間テキスト
  textLight: "#b07040",       // 薄いテキスト
  shadow:    "0 2px 16px #f9731618",
  shadowMd:  "0 4px 24px #f9731625",
};

function App() {
  const [screen, setScreen] = useState("home");
  const [selectedCategory, setSelectedCategory] = useState("すべて");
  const [currentQ, setCurrentQ] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showExplanation, setShowExplanation] = useState(false);
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [sessionResults, setSessionResults] = useState([]);
  const [allResults, setAllResults] = useState({});
  const [bookmarks, setBookmarks] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadData(); }, []);

  function loadData() {
    setLoading(true);
    try { const r = JSON.parse(localStorage.getItem("results") || "null"); if (r) setAllResults(r); } catch(e) {}
    try { const b = JSON.parse(localStorage.getItem("bookmarks") || "null"); if (b) setBookmarks(b); } catch(e) {}
    setLoading(false);
  }

  function saveResults(u) { localStorage.setItem("results", JSON.stringify(u)); }
  function saveBookmarks(u) { localStorage.setItem("bookmarks", JSON.stringify(u)); }

  function startQuiz(mode = "normal") {
    let pool = selectedCategory === "すべて" ? [...QUESTIONS] : QUESTIONS.filter(q => q.category === selectedCategory);
    if (mode === "bookmarks") pool = QUESTIONS.filter(q => bookmarks.includes(q.id));
    if (pool.length === 0) return;
    setQuizQuestions([...pool].sort(() => Math.random() - 0.5));
    setCurrentQ(0); setSelectedAnswer(null); setShowExplanation(false); setSessionResults([]);
    setScreen("quiz");
  }

  function handleAnswer(idx) {
    if (selectedAnswer !== null) return;
    setSelectedAnswer(idx); setShowExplanation(true);
    const q = quizQuestions[currentQ];
    const correct = idx === q.answer;
    const updated = { ...allResults, [q.id]: { attempts: (allResults[q.id]?.attempts||0)+1, correct: (allResults[q.id]?.correct||0)+(correct?1:0), last: correct?"correct":"wrong" }};
    setAllResults(updated); saveResults(updated);
    setSessionResults(prev => [...prev, { id: q.id, correct }]);
  }

  function next() {
    if (currentQ + 1 >= quizQuestions.length) { setScreen("result"); }
    else { setCurrentQ(p => p+1); setSelectedAnswer(null); setShowExplanation(false); }
  }

  function toggleBookmark(id) {
    const updated = bookmarks.includes(id) ? bookmarks.filter(b => b!==id) : [...bookmarks, id];
    setBookmarks(updated); saveBookmarks(updated);
  }

  const totalAttempts = Object.values(allResults).reduce((a,r) => a+r.attempts, 0);
  const totalCorrect  = Object.values(allResults).reduce((a,r) => a+r.correct, 0);
  const accuracy = totalAttempts > 0 ? Math.round((totalCorrect/totalAttempts)*100) : 0;
  const categoryStats = CATEGORIES.slice(1).map(cat => {
    const qs = QUESTIONS.filter(q => q.category === cat);
    const done    = qs.filter(q => allResults[q.id]?.attempts > 0).length;
    const correct = qs.filter(q => allResults[q.id]?.last === "correct").length;
    return { cat, total: qs.length, done, correct };
  });

  if (loading) return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "16px" }}>
      <div style={{ fontSize: "2.5rem" }}>📖</div>
      <div style={{ color: C.orange, fontFamily: "sans-serif", fontSize: "1rem", fontWeight: "600" }}>読み込み中…</div>
    </div>
  );

  // ── スタイル定義 ──
  const S = {
    app: {
      background: C.bg,
      minHeight: "100vh",
      color: C.text,
      fontFamily: "'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif",
      padding: "0 0 100px 0",
    },
    header: {
      background: `linear-gradient(135deg, ${C.orange} 0%, ${C.red} 100%)`,
      padding: "18px 20px 16px",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      boxShadow: "0 3px 20px #f9731640",
    },
    navBtn: (active) => ({
      padding: "7px 16px", borderRadius: "20px", fontSize: "0.8rem",
      cursor: "pointer", fontFamily: "inherit", fontWeight: "600", transition: "all 0.2s",
      background: active ? "#fff" : "rgba(255,255,255,0.2)",
      color: active ? C.orange : "#fff",
      border: active ? "none" : "1px solid rgba(255,255,255,0.4)",
    }),
    card: {
      background: C.surface, borderRadius: "20px", padding: "20px",
      margin: "14px 14px 0", boxShadow: C.shadow,
      border: `1px solid ${C.border}`,
    },
    statBox: (color) => ({
      background: "#fff", borderRadius: "16px", padding: "14px 10px",
      textAlign: "center", boxShadow: C.shadow,
      border: `2px solid ${color}30`,
    }),
    pill: (active, color = C.orange) => ({
      padding: "7px 14px", borderRadius: "20px", fontSize: "0.78rem",
      cursor: "pointer", fontFamily: "inherit", fontWeight: active ? "700" : "500",
      background: active ? color : "#fff",
      color: active ? "#fff" : C.textMid,
      border: active ? `2px solid ${color}` : `2px solid ${C.border}`,
      transition: "all 0.18s",
      boxShadow: active ? `0 2px 10px ${color}40` : "none",
    }),
    btn: (color = C.orange, ghost = false) => ({
      background: ghost ? "#fff" : `linear-gradient(135deg, ${color} 0%, ${color}cc 100%)`,
      color: ghost ? color : "#fff",
      border: ghost ? `2px solid ${color}` : "none",
      borderRadius: "14px", padding: "14px 20px",
      fontSize: "0.95rem", cursor: "pointer", fontFamily: "inherit",
      fontWeight: "700", width: "100%", marginTop: "10px",
      boxShadow: ghost ? "none" : `0 4px 14px ${color}50`,
      transition: "all 0.2s",
    }),
    optionBtn: (state) => {
      const base = {
        padding: "13px 16px", borderRadius: "12px", border: "2px solid",
        textAlign: "left", cursor: state !== "normal" ? "default" : "pointer",
        fontFamily: "inherit", fontSize: "0.88rem", width: "100%",
        marginBottom: "9px", transition: "all 0.2s", lineHeight: "1.55",
        fontWeight: "500",
      };
      if (state === "correct")   return { ...base, background: "#f0fdf4", borderColor: C.green,  color: C.green };
      if (state === "wrong")     return { ...base, background: "#fff5f5", borderColor: C.wrong,  color: C.wrong };
      if (state === "highlight") return { ...base, background: "#f0fdf4", borderColor: C.green,  color: C.green };
      return { ...base, background: "#fffaf6", borderColor: C.border, color: C.text };
    },
  };

  const q = screen === "quiz" ? quizQuestions[currentQ] : null;
  const catColor = q ? (CATEGORY_COLORS[q.category]?.accent || C.orange) : C.orange;
  const catLight  = q ? (CATEGORY_COLORS[q.category]?.light  || C.orange+"18") : C.orange+"18";

  return (
    <div style={S.app}>
      {/* ── Header ── */}
      <div style={S.header}>
        <div>
          <div style={{ fontSize: "1.05rem", fontWeight: "800", color: "#fff", letterSpacing: "0.04em" }}>
            📝 日本語教員試験
          </div>
          <div style={{ fontSize: "0.68rem", color: "rgba(255,255,255,0.8)", marginTop: "2px", letterSpacing: "0.12em" }}>
            450問 学習アプリ
          </div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          {["home", "stats"].map(s => (
            <button key={s} style={S.navBtn(screen === s || (screen === "quiz" && s === "home") || (screen === "result" && s === "home"))} onClick={() => setScreen(s)}>
              {s === "home" ? "🎯 問題" : "📊 進捗"}
            </button>
          ))}
        </div>
      </div>

      {/* ── HOME ── */}
      {screen === "home" && (
        <div>
          {/* Hero summary */}
          <div style={{ background: `linear-gradient(160deg, ${C.orange}12 0%, ${C.amber}08 100%)`, padding: "18px 14px 4px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "16px" }}>
              {[
                { label: "挑戦", val: totalAttempts, color: C.orange, icon: "🔥" },
                { label: "正解", val: totalCorrect,  color: C.green,  icon: "✅" },
                { label: "正答率", val: accuracy+"%", color: C.red,   icon: "⭐" },
              ].map(s => (
                <div key={s.label} style={S.statBox(s.color)}>
                  <div style={{ fontSize: "1.1rem", marginBottom: "2px" }}>{s.icon}</div>
                  <div style={{ fontSize: "1.5rem", fontWeight: "800", color: s.color }}>{s.val}</div>
                  <div style={{ fontSize: "0.68rem", color: C.textLight, marginTop: "2px" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Category filter */}
          <div style={{ padding: "16px 14px 8px" }}>
            <div style={{ fontSize: "0.72rem", color: C.textLight, marginBottom: "10px", fontWeight: "700", letterSpacing: "0.12em" }}>▸ 分野を選ぶ</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
              {CATEGORIES.map(c => {
                const col = c === "すべて" ? C.orange : (CATEGORY_COLORS[c]?.accent || C.orange);
                return <button key={c} style={S.pill(selectedCategory === c, col)} onClick={() => setSelectedCategory(c)}>{c}</button>;
              })}
            </div>
          </div>

          {/* Start buttons */}
          <div style={{ padding: "4px 14px 0" }}>
            <button style={S.btn(catColor === C.text ? C.orange : catColor)} onClick={() => startQuiz()}>
              {selectedCategory === "すべて" ? "🎲 ランダムで問題を解く" : `▶ 「${selectedCategory}」を解く`}
            </button>
            <button style={S.btn(C.amber, true)} onClick={() => { if (bookmarks.length) startQuiz("bookmarks"); }}>
              ★ 苦手問題を解く（{bookmarks.length}問）
            </button>
          </div>

          {/* Category progress */}
          <div style={S.card}>
            <div style={{ fontSize: "0.78rem", color: C.textMid, marginBottom: "16px", fontWeight: "700", letterSpacing: "0.08em" }}>📈 分野別 進捗</div>
            {categoryStats.map(({ cat, total, done, correct }) => {
              const color = CATEGORY_COLORS[cat]?.accent || C.orange;
              const icon  = CATEGORY_COLORS[cat]?.label || "📌";
              const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
              return (
                <div key={cat} style={{ marginBottom: "16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" }}>
                    <span style={{ fontSize: "0.8rem", color, fontWeight: "700" }}>{icon} {cat}</span>
                    <span style={{ fontSize: "0.72rem", color: C.textLight }}>{done}/{total}問　✓ {correct}正解</span>
                  </div>
                  <div style={{ background: C.bgDeep, borderRadius: "8px", height: "8px", overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, ${color}, ${color}aa)`, borderRadius: "8px", transition: "width 0.6s cubic-bezier(.4,0,.2,1)" }} />
                  </div>
                  <div style={{ fontSize: "0.68rem", color: C.textLight, marginTop: "3px", textAlign: "right" }}>{pct}%</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── QUIZ ── */}
      {screen === "quiz" && q && (
        <div>
          {/* Progress bar */}
          <div style={{ padding: "14px 14px 0" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
              <span style={{ fontSize: "0.72rem", color: catColor, fontWeight: "700", background: catLight, padding: "3px 10px", borderRadius: "12px" }}>
                {CATEGORY_COLORS[q.category]?.label} {q.category}
              </span>
              <span style={{ fontSize: "0.72rem", color: C.textLight, fontWeight: "600" }}>
                {currentQ + 1} / {quizQuestions.length}
              </span>
            </div>
            <div style={{ background: C.bgDeep, borderRadius: "8px", height: "6px", overflow: "hidden" }}>
              <div style={{ width: `${((currentQ+1)/quizQuestions.length)*100}%`, height: "100%", background: `linear-gradient(90deg, ${catColor}, ${C.amber})`, borderRadius: "8px", transition: "width 0.35s ease" }} />
            </div>
          </div>

          <div style={S.card}>
            {/* Bookmark & Q# */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
              <div style={{ fontSize: "0.8rem", fontWeight: "800", color: catColor, background: catLight, padding: "5px 12px", borderRadius: "20px" }}>
                Q {currentQ + 1}
              </div>
              <button onClick={() => toggleBookmark(q.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.5rem", transition: "transform 0.2s" }}>
                {bookmarks.includes(q.id) ? "⭐" : "☆"}
              </button>
            </div>

            <div style={{ fontSize: "0.97rem", lineHeight: "1.75", marginBottom: "22px", color: C.text, fontWeight: "500" }}>{q.question}</div>

            {q.options.map((opt, i) => {
              let state = "normal";
              if (selectedAnswer !== null) {
                if (i === q.answer) state = "correct";
                else if (i === selectedAnswer && i !== q.answer) state = "wrong";
              }
              return (
                <button key={i} style={S.optionBtn(state)} onClick={() => handleAnswer(i)}>
                  <span style={{
                    display: "inline-block", width: "22px", height: "22px", lineHeight: "22px",
                    textAlign: "center", borderRadius: "50%", marginRight: "10px",
                    fontSize: "0.75rem", fontWeight: "800",
                    background: state === "correct" ? C.green : state === "wrong" ? C.wrong : C.orange,
                    color: "#fff", flexShrink: 0,
                  }}>{["A","B","C","D"][i]}</span>
                  {opt}
                </button>
              );
            })}

            {showExplanation && (
              <div style={{ background: `linear-gradient(135deg, #fffbf0 0%, #fff8ec 100%)`, border: `2px solid ${C.amber}40`, borderRadius: "14px", padding: "16px", marginTop: "10px" }}>
                <div style={{ fontSize: "0.72rem", color: C.amber, fontWeight: "800", marginBottom: "8px", letterSpacing: "0.1em" }}>
                  💡 解説
                </div>
                <div style={{ fontSize: "0.85rem", lineHeight: "1.85", color: C.text }}>{q.explanation}</div>
              </div>
            )}

            {selectedAnswer !== null && (
              <button style={S.btn(catColor)} onClick={next}>
                {currentQ+1 >= quizQuestions.length ? "🏆 結果を見る" : "次の問題へ →"}
              </button>
            )}
          </div>
        </div>
      )}

      {/* ── RESULT ── */}
      {screen === "result" && (
        <div style={S.card}>
          <div style={{ textAlign: "center", padding: "20px 0 12px" }}>
            <div style={{ fontSize: "3.5rem", marginBottom: "10px" }}>
              {sessionResults.filter(r=>r.correct).length/sessionResults.length >= 0.8 ? "🎉" : sessionResults.filter(r=>r.correct).length/sessionResults.length >= 0.5 ? "👍" : "💪"}
            </div>
            <div style={{ fontSize: "0.8rem", color: C.textLight, marginBottom: "6px", fontWeight: "600" }}>セッション結果</div>
            <div style={{ fontSize: "3.2rem", fontWeight: "800", color: C.orange, lineHeight: 1 }}>
              {sessionResults.filter(r=>r.correct).length}
              <span style={{ fontSize: "1.4rem", color: C.textLight }}>/{sessionResults.length}</span>
            </div>
            <div style={{ fontSize: "0.9rem", color: C.textMid, marginTop: "6px", fontWeight: "600" }}>
              正答率 {Math.round(sessionResults.filter(r=>r.correct).length/sessionResults.length*100)}%
            </div>
          </div>

          <div style={{ marginTop: "16px", borderTop: `1px solid ${C.border}`, paddingTop: "12px" }}>
            {sessionResults.map((r, i) => {
              const qq = quizQuestions[i];
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: "1.1rem", flexShrink: 0 }}>{r.correct ? "✅" : "❌"}</span>
                  <span style={{ fontSize: "0.8rem", color: C.text, flex: 1, lineHeight: 1.4 }}>{qq.question.substring(0, 30)}…</span>
                  <button onClick={() => toggleBookmark(qq.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.1rem" }}>
                    {bookmarks.includes(qq.id) ? "⭐" : "☆"}
                  </button>
                </div>
              );
            })}
          </div>

          <button style={S.btn(C.orange)} onClick={() => setScreen("home")}>🏠 ホームに戻る</button>
          <button style={S.btn(C.red, true)} onClick={() => startQuiz()}>🔄 もう一度</button>
        </div>
      )}

      {/* ── STATS ── */}
      {screen === "stats" && (
        <div>
          <div style={S.card}>
            <div style={{ fontSize: "0.8rem", color: C.textMid, marginBottom: "14px", fontWeight: "700" }}>🏆 総合成績</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              {[
                { label: "総挑戦数", val: totalAttempts, color: C.orange, icon: "🔥" },
                { label: "総正解数", val: totalCorrect,  color: C.green,  icon: "✅" },
                { label: "正答率",   val: accuracy+"%",  color: C.red,    icon: "⭐" },
                { label: "ブックマーク", val: bookmarks.length+"問", color: C.amber, icon: "📌" },
              ].map(s => (
                <div key={s.label} style={S.statBox(s.color)}>
                  <div style={{ fontSize: "1.3rem", marginBottom: "4px" }}>{s.icon}</div>
                  <div style={{ fontSize: "1.8rem", fontWeight: "800", color: s.color }}>{s.val}</div>
                  <div style={{ fontSize: "0.68rem", color: C.textLight, marginTop: "3px" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={S.card}>
            <div style={{ fontSize: "0.8rem", color: C.textMid, marginBottom: "14px", fontWeight: "700" }}>📋 問題別 履歴</div>
            {QUESTIONS.map(q => {
              const r = allResults[q.id];
              if (!r) return null;
              return (
                <div key={q.id} style={{ display: "flex", alignItems: "center", gap: "9px", padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: "0.85rem", flexShrink: 0 }}>{r.last === "correct" ? "✅" : "❌"}</span>
                  <span style={{ fontSize: "0.78rem", color: C.text, flex: 1, lineHeight: 1.4 }}>{q.question.substring(0, 28)}…</span>
                  <span style={{ fontSize: "0.7rem", color: C.textLight, flexShrink: 0, fontWeight: "600" }}>{r.correct}/{r.attempts}</span>
                  <button onClick={() => toggleBookmark(q.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1rem" }}>
                    {bookmarks.includes(q.id) ? "⭐" : "☆"}
                  </button>
                </div>
              );
            })}
            {Object.keys(allResults).length === 0 && (
              <div style={{ textAlign: "center", color: C.textLight, padding: "28px", fontSize: "0.85rem" }}>
                <div style={{ fontSize: "2rem", marginBottom: "8px" }}>📝</div>
                まだ問題を解いていません
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
